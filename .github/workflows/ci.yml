name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  validate-project:
    name: Validate Project and Docker Build
    runs-on: ubuntu-latest

    env:
      ADMIN_API_KEY: admin-demo-key
      ANALYST_API_KEY: analyst-demo-key
      VIEWER_API_KEY: viewer-demo-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm large local database is not tracked
        run: |
          if git ls-files | grep -E 'retail_intelligence\.db|\.sqlite$|\.sqlite3$|\.db$'; then
            echo "Large local database files should not be committed to GitHub."
            exit 1
          fi
          echo "No local database files are tracked."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m compileall src scripts

      - name: Validate core Python imports
        run: |
          python -c "import src.api.main; import src.api.database; import src.api.auth; import src.ai_assistant.business_insights; print('Core import validation passed')"

      - name: Verify Docker setup
        run: |
          python scripts/verify_docker_setup.py

      - name: Verify CI setup
        run: |
          python scripts/verify_ci_setup.py

      - name: Build Docker image
        run: |
          docker build -t ecommerce-retail-api .