name: CD - Deploy FastAPI Container to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ecommerce-retail-api
  IMAGE_TAG: latest

jobs:
  build-push-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set deployment variables
        run: |
          echo "ACR_NAME=$(echo '${{ secrets.ACR_LOGIN_SERVER }}' | cut -d'.' -f1)" >> $GITHUB_ENV

      - name: Docker login to Azure Container Registry
        run: |
          az acr login --name "${{ env.ACR_NAME }}"

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Push Docker image to Azure Container Registry
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Ensure App Service managed identity exists
        run: |
          az webapp identity assign \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}"

      - name: Ensure App Service has AcrPull permission
        run: |
          PRINCIPAL_ID=$(az webapp identity show \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query principalId \
            --output tsv)

          ACR_ID=$(az acr show \
            --name "${{ env.ACR_NAME }}" \
            --query id \
            --output tsv)

          az role assignment create \
            --assignee "$PRINCIPAL_ID" \
            --role AcrPull \
            --scope "$ACR_ID" || true

      - name: Configure App Service to use managed identity for ACR
        run: |
          az webapp config set \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --generic-configurations '{"acrUseManagedIdentityCreds": true}'

      - name: Set App Service container image
        run: |
          az webapp config container set \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --container-image-name "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

      - name: Restart Azure App Service
        run: |
          az webapp restart \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}"

      - name: Wait for application startup
        run: |
          sleep 90

      - name: Verify deployed health endpoint with retries
        run: |
          echo "Checking deployed API health endpoint..."

          for i in {1..15}; do
            echo "Health check attempt $i of 15"

            if curl --fail --show-error --silent "${{ secrets.AZURE_APP_BASE_URL }}/health/"; then
              echo ""
              echo "Health check passed."
              exit 0
            fi

            echo ""
            echo "Health check failed. Waiting 30 seconds before retrying..."
            sleep 30
          done

          echo "Health check failed after all retry attempts."
          exit 1